# resource_id: 1aa19d14-138d-4be1-bf4b-4bee0b9f8ba5
[tool:pytest]
# Pytest configuration for Hard Testing Rule Enforcement
# Language Tracker Project

# Test discovery
testpaths = features tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output and reporting
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=features
    --cov-report=term-missing
    --cov-report=html:test-results/htmlcov
    --cov-report=xml:test-results/coverage.xml
    --cov-fail-under=90
    --junit-xml=test-results/junit.xml
    --maxfail=5
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests - fast, isolated tests
    integration: Integration tests - test component interactions
    e2e: End-to-end tests - full user workflow tests
    slow: Tests that take more than 30 seconds
    fast: Tests that complete in under 5 seconds
    user_story: Tests that validate specific user stories
    security: Security-related tests
    performance: Performance and benchmark tests
    firebase: Tests that require Firebase connection
    database: Tests that require database connection
    
# Test timeouts (in seconds)
timeout = 300
timeout_method = thread

# Parallel execution
dist = worksteal
tx = popen

# Filter warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning:bcrypt.*
    ignore::DeprecationWarning:datetime.*

# Minimum Python version
minversion = 3.9

# Coverage settings (also in .coveragerc)
required_plugins = pytest-cov pytest-timeout pytest-xdist

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test order randomization (optional)
# addopts = --random-order