# resource_id: 04e3c846-e612-4507-8d06-40bbcf344972
name: Test Gate - Hard Rule Enforcement

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'

jobs:
  # Unit Tests - Fast execution
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage bcrypt flask flask-testing
          
      - name: Install Node dependencies
        run: npm ci
        
      - name: Run Python unit tests with coverage
        run: |
          coverage run -m pytest tests/unit/ --verbose --tb=short
          coverage report --show-missing --fail-under=90
          coverage xml
          
      - name: Run JavaScript/React unit tests
        run: npm run test:unit
        
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true

  # Integration Tests - API and Database
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests
    
    env:
      FIREBASE_PROJECT_ID: lang-trak-test
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage bcrypt flask flask-testing
          npm ci
          
      - name: Set up Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}' > firebase-service-account-test.json
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/firebase-service-account-test.json"
          
      - name: Run integration tests
        run: |
          pytest tests/integration/ --verbose --tb=short
          
      - name: Verify Firestore collections
        run: |
          python tests/helpers/firestore_validation.py --project $FIREBASE_PROJECT_ID --verify-collections

  # End-to-End Tests - Full User Workflows
  e2e-tests:
    name: E2E Tests (Playwright + Headed Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: integration-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        
      - name: Set up test Firebase project
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}' > firebase-service-account-test.json
          echo '${{ secrets.FIREBASE_CONFIG_TEST }}' > src/config/firebase-config-test.json
          
      - name: Build application for testing
        run: npm run build:test
        
      - name: Start test server
        run: |
          npm run start:test &
          sleep 10
          
      - name: Run Playwright E2E tests (Fast)
        run: |
          npx playwright test tests/e2e/fast/ --headed --project=chromium --workers=2
          
      - name: Run Playwright E2E tests (Realistic)
        run: |
          npx playwright test tests/e2e/realistic/ --headed --project=chromium --workers=1
          
      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # User Story Validation Tests
  user-story-tests:
    name: User Story Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: integration-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        
      - name: Set up test environment
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}' > firebase-service-account-test.json
          echo '${{ secrets.FIREBASE_CONFIG_TEST }}' > src/config/firebase-config-test.json
          
      - name: Build application for testing
        run: npm run build:test
        
      - name: Start test server
        run: |
          npm run start:test &
          sleep 10
          
      - name: Run User Story automation tests (Fast)
        run: |
          npx playwright test tests/user_stories/fast/ --headed --project=chromium --workers=2
          
      - name: Run User Story automation tests (Realistic)
        run: |
          npx playwright test tests/user_stories/realistic/ --headed --project=chromium --workers=1
          
      - name: Validate user story completion
        run: |
          python tests/helpers/user_story_validator.py --validate-all --output-format=junit
          
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: user-story-results
          path: test-results/
          retention-days: 7

  # Security and Performance Tests
  security-performance:
    name: Security & Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: |
          npm audit --audit-level=moderate
          
      - name: Run dependency vulnerability scan
        run: |
          npx audit-ci --moderate
          
      - name: Build application
        run: npm run build
        
      - name: Run Lighthouse performance tests
        run: |
          npm install -g @lhci/cli
          lhci autorun
          
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 7

  # Final Gate - All Tests Must Pass
  test-gate-summary:
    name: 🚨 Test Gate - All Tests Must Pass
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, user-story-tests, security-performance]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "Checking all test job results..."
          
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "❌ E2E tests failed"
            exit 1
          fi
          
          if [[ "${{ needs.user-story-tests.result }}" != "success" ]]; then
            echo "❌ User story tests failed"
            exit 1
          fi
          
          if [[ "${{ needs.security-performance.result }}" != "success" ]]; then
            echo "❌ Security/Performance tests failed"
            exit 1
          fi
          
          echo "✅ All tests passed! Gate is open for progression."
          
      - name: Test gate passed
        run: |
          echo "🎉 HARD RULE ENFORCED: All automated tests have passed"
          echo "✅ Batch progressions: ALLOWED"
          echo "✅ PR merges: ALLOWED" 
          echo "✅ Releases: ALLOWED"